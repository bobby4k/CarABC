days:
  - day: 1
    stage: 启蒙
    theme: AE86
    theme_type: car_model
    image_style: 写实风，背景简洁
    image_prompt: 一辆丰田 AE86 跑车，优先参考玩具车常见出品车型或对应实车，写实风，三分之二侧前方视角，主体明确，背景简洁，白天，儿童友好，无文字
    cn_sentence: 白色AE86停在路边。
    cn_pinyin_marks:
      - word: 白色
        pinyin: bai2 se4
      - word: 路边
        pinyin: lu4 bian1
    en_sentence: The white AE86 is by the road.
    en_word_notes:
      - word: white
        note: 白色的
      - word: road
        note: 路边
    task: 说一说这辆车是什么颜色。
    image_path: cards/day001/image.jpg

